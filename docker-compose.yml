# -----------------------------------------------------------------------------
# TgDir — docker-compose for Coolify (preferred) or plain Docker.
#
# Coolify:
#   - Resource type: "Docker Compose"
#   - Point it at this file; Coolify auto-joins services to its proxy network
#     and reads `expose:` to configure Traefik. Do NOT publish ports to the
#     host (Traefik handles all ingress).
#   - Fill the Environment tab using .env.example as a template (at minimum
#     NEXTAUTH_URL, NEXTAUTH_SECRET, POSTGRES_PASSWORD, DATABASE_URL).
#   - Attach your domain to the `web` service.
#
# Plain Docker:
#   cp .env.example .env
#   docker compose up -d --build
#   # one-off seed (first boot)
#   docker compose exec web sh -c \
#     "node ./node_modules/tsx/dist/cli.mjs ./prisma/seed.ts"
# -----------------------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgdir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgdir}
      POSTGRES_DB: ${POSTGRES_DB:-tgdir}
    volumes:
      - tgdir-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgdir} -d ${POSTGRES_DB:-tgdir}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:-postgresql://tgdir:tgdir@db:5432/tgdir?schema=public}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      RUN_SEED: ${RUN_SEED:-false}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      COINBASE_COMMERCE_KEY: ${COINBASE_COMMERCE_KEY:-}
      COINBASE_WEBHOOK_SECRET: ${COINBASE_WEBHOOK_SECRET:-}
    # `expose` advertises the port on the Docker network without publishing it
    # to the host. Coolify's Traefik picks this up and routes your domain to
    # it. For plain-Docker usage, uncomment `ports:` below.
    expose:
      - "3000"
    # ports:
    #   - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  tgdir-postgres:
