# -----------------------------------------------------------------------------
# TgDir — docker-compose for self-hosting via Coolify / plain Docker.
#
# Coolify usage:
#   - Create a new "Docker Compose" resource pointing at this file.
#   - Set the env vars from .env.example under Coolify → Environment.
#   - Attach a domain to the `web` service (port 3000).
#
# Plain Docker usage:
#   cp .env.example .env        # edit DATABASE_URL, NEXTAUTH_SECRET, etc.
#   docker compose up -d --build
#   docker compose exec web sh -c "RUN_SEED=true node ./node_modules/tsx/dist/cli.mjs ./prisma/seed.ts"
# -----------------------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgdir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgdir}
      POSTGRES_DB: ${POSTGRES_DB:-tgdir}
    volumes:
      - tgdir-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgdir} -d ${POSTGRES_DB:-tgdir}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tgdir

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://tgdir:tgdir@db:5432/tgdir?schema=public}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      RUN_SEED: ${RUN_SEED:-false}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      COINBASE_COMMERCE_KEY: ${COINBASE_COMMERCE_KEY:-}
      COINBASE_WEBHOOK_SECRET: ${COINBASE_WEBHOOK_SECRET:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - tgdir
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  tgdir-postgres:

networks:
  tgdir:
    driver: bridge
